name: Odoo Developer Monday Morning Summary

# Controls when the action will run
on:
  schedule:
    # Runs at 08:00 UTC (e.g. 9:00 AM CET / 10:00 AM EET) every Monday morning.
    # To change when this runs (e.g. daily, or on different hours), modify this cron string.
    # Cron format: [minute] [hour] [day of month] [month] [day of week]
    # '0 8 * * 1' means: 0th minute, 8th hour, any day of month, any month, day 1 (Monday).
    - cron: '0 8 * * 1'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      branch:
        description: 'Odoo Branch to pull from (e.g. 17.0, 16.0, master)'
        required: true
        default: '18.0'
      lookback_days:
        description: 'Number of lookback days'
        required: true
        default: '7'
      target_modules:
        description: 'Comma-separated target modules'
        required: true
        default: 'account,sale,point_of_sale,stock,base'
      dry_run:
        description: 'Dry Run? (true/false)'
        type: boolean
        required: true
        default: false

jobs:
  summary_job:
    runs-on: ubuntu-latest

    # Set up global environment variables with customizable defaults
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ODOO_BRANCH: ${{ github.event.inputs.branch || '17.0' }}
      MERGE_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
      ODOO_TARGET_MODULES: ${{ github.event.inputs.target_modules || 'account,sale,point_of_sale,stock,base' }}

    steps:
    - name: Check out Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies for faster builds

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Monday Morning Odoo Summary Agent
      # Injects secrets and runs the script.
      # Automatically handles workflow dispatch inputs and dry run selection.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        DRY_RUN_ARG=""
        if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
          DRY_RUN_ARG="--dry-run"
        fi
        
        # Execute the python script with dynamically injected variables
        python agent.py $DRY_RUN_ARG
